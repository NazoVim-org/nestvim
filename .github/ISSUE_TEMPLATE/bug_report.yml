name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps and inputs
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, terminal emulator
    validations:
      required: true
