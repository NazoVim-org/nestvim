name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-linux:
    name: Linux check (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck

  test-linux-arm:
    name: Linux check (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test

  test-macos:
    name: macOS check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test
