name: PR Title Check

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-pr-title:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional --legacy-peer-deps

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [ -z "${PR_TITLE// }" ]; then
            echo "PR title must not be empty"
            exit 1
          fi
          echo "PR title: $PR_TITLE"
