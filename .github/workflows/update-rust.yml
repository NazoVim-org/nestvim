name: Update Rust Version

on:
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜
  workflow_dispatch:

jobs:
  update-rust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      # 現在のバージョン取得
      - name: Get current Rust version
        id: current
        run: |
          VERSION=$(grep '^channel =' rust-toolchain.toml | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 最新バージョン取得（公式ソース）
      - name: Get latest Rust stable version
        id: latest
        run: |
          VERSION=$(curl -s https://static.rust-lang.org/dist/channel-rust-stable.toml \
            | grep '^version = ' \
            | head -1 \
            | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 比較（完全一致でOK）
      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.current.outputs.version }}" != "${{ steps.latest.outputs.version }}" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      # 更新（安全に書き換え）
      - name: Update rust-toolchain.toml
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          sed -i -E 's/^channel = ".*"/channel = "${{ steps.latest.outputs.version }}"/' rust-toolchain.toml

      - name: Update flake.nix
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          sed -i -E 's/rustVersion = ".*"/rustVersion = "${{ steps.latest.outputs.version }}"/' flake.nix

      # 変更があるかチェック（無駄PR防止）
      - name: Check for changes
        id: diff
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # PR作成
      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Rust to ${{ steps.latest.outputs.version }}"
          title: "chore: update Rust to ${{ steps.latest.outputs.version }}"
          body: |
            Auto update Rust version

            - Current: ${{ steps.current.outputs.version }}
            - Latest: ${{ steps.latest.outputs.version }}

            Updated:
            - rust-toolchain.toml
            - flake.nix
          branch: update-rust-${{ steps.latest.outputs.version }}
          delete-branch: true
